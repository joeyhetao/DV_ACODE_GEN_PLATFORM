services:
  embedding_service:
    environment:
      - EMBED_MODEL=BAAI/bge-small-zh-v1.5
      - RERANK_MODEL=BAAI/bge-reranker-v2-m3
      - DEVICE=cpu
    deploy: {}

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
      - backend_backups:/app/backups

  celery_worker:
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
