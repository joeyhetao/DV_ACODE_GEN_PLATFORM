events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        # Use Docker's internal DNS resolver; re-resolve upstreams every 10s
        # so nginx picks up the new IP when backend restarts (hot-reload).
        resolver 127.0.0.11 valid=10s ipv6=off;

        client_max_body_size 50M;

        location /api/ {
            set $upstream_backend http://backend:8000;
            proxy_pass         $upstream_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        location / {
            set $upstream_frontend http://frontend:80;
            proxy_pass         $upstream_frontend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
